services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentropolis
      POSTGRES_USER: agentropolis
      POSTGRES_PASSWORD: agentropolis_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentropolis"]
      interval: 5s
      timeout: 3s
      retries: 5

  game-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentropolis:agentropolis_dev@postgres:5432/agentropolis
      TICK_INTERVAL_SECONDS: 60
      INITIAL_BALANCE: 10000
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m agentropolis"

volumes:
  pgdata:
